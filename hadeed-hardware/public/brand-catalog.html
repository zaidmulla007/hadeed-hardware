<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brand Catalog — Total Hardware Solution</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0e11;
  --surface:#16181d;
  --surface2:#1e2028;
  --border:#2a2d36;
  --accent:#f5a623;
  --accent2:#e8f542;
  --text:#f0f0f0;
  --muted:#7a7f8e;
  --card-hover:#22252f;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
}

/* HERO */
.hero{
  padding:60px 40px 50px;
  border-bottom:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;
  top:-80px; right:-80px;
  width:400px; height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.hero-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;
  font-weight:600;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:12px;
}
.hero-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(36px,6vw,72px);
  font-weight:800;
  line-height:1;
  text-transform:uppercase;
  letter-spacing:-1px;
  margin-bottom:16px;
}
.hero-title span{color:var(--accent);}
.hero-sub{
  color:var(--muted);
  font-weight:300;
  font-size:16px;
  max-width:520px;
  margin-bottom:32px;
}
.stats-row{
  display:flex;
  gap:32px;
  flex-wrap:wrap;
}
.stat{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.stat-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:36px;
  font-weight:700;
  color:var(--accent);
  line-height:1;
}
.stat-lbl{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}

/* CONTROLS */
.controls{
  padding:24px 40px;
  border-bottom:1px solid var(--border);
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(13,14,17,0.95);
  backdrop-filter:blur(12px);
}
.search-wrap{
  flex:1;
  min-width:200px;
  position:relative;
}
.search-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:14px;
}
.search-bar{
  width:100%;
  padding:10px 14px 10px 38px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'Barlow',sans-serif;
  font-size:14px;
  outline:none;
  transition:border-color 0.2s;
}
.search-bar:focus{border-color:var(--accent);}
.search-bar::placeholder{color:var(--muted);}
.filter-tabs{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.tab{
  padding:8px 14px;
  border-radius:6px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:'Barlow',sans-serif;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.expand-btn{
  padding:10px 16px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:'Barlow',sans-serif;
  font-size:12px;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}
.expand-btn:hover{border-color:var(--text);color:var(--text);}

/* GRID */
.grid{
  padding:32px 40px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}

/* BRAND CARD */
.brand-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transition:border-color 0.2s, background 0.2s;
}
.brand-card:hover{
  border-color:rgba(245,166,35,0.4);
  background:var(--card-hover);
}
.brand-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  cursor:pointer;
  user-select:none;
  gap:12px;
}
.brand-left{display:flex;align-items:center;gap:12px;}
.brand-icon{
  width:40px;height:40px;
  border-radius:8px;
  background:var(--surface2);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:14px;
  color:var(--accent);
  flex-shrink:0;
}
.brand-info{display:flex;flex-direction:column;gap:2px;}
.brand-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:17px;
  letter-spacing:0.5px;
  text-transform:uppercase;
  color:var(--text);
}
.brand-meta{
  font-size:11px;
  color:var(--muted);
  display:flex;gap:8px;
}
.brand-meta span{
  background:var(--surface2);
  padding:2px 7px;
  border-radius:4px;
  border:1px solid var(--border);
}
.chevron{
  color:var(--muted);
  font-size:18px;
  transition:transform 0.3s;
  flex-shrink:0;
}
.brand-card.open .chevron{transform:rotate(180deg);}
.brand-card.open .brand-header{border-bottom:1px solid var(--border);}

/* BODY */
.brand-body{
  display:none;
  padding:16px 20px;
}
.brand-card.open .brand-body{display:block;}

.cat-block{margin-bottom:16px;}
.cat-block:last-child{margin-bottom:0;}
.cat-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--accent);
  margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.cat-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}
.sub-grid{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.sub-pill{
  font-size:12px;
  padding:5px 11px;
  border-radius:20px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:#c0c3cc;
  transition:all 0.15s;
  cursor:default;
}
.sub-pill:hover{
  background:rgba(245,166,35,0.12);
  border-color:rgba(245,166,35,0.5);
  color:var(--accent);
}

/* SECTOR TAGS */
.sector-tag{
  display:inline-block;
  font-size:10px;
  padding:2px 8px;
  border-radius:4px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-left:6px;
}
.sector-tools{background:rgba(245,166,35,0.15);color:#f5a623;}
.sector-safety{background:rgba(232,245,66,0.12);color:#c8d930;}
.sector-welding{background:rgba(255,100,80,0.12);color:#ff7060;}
.sector-chemicals{background:rgba(80,200,180,0.12);color:#50c8b4;}
.sector-testing{background:rgba(120,140,255,0.15);color:#8899ff;}
.sector-abrasives{background:rgba(200,140,80,0.15);color:#cc9955;}

/* NO RESULTS */
.no-results{
  grid-column:1/-1;
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}
.no-results-icon{font-size:40px;margin-bottom:12px;}

/* FOOTER */
.footer{
  padding:32px 40px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  color:var(--muted);
  font-size:13px;
}

@media(max-width:600px){
  .hero{padding:40px 20px 32px;}
  .controls{padding:16px 20px;}
  .grid{padding:20px;grid-template-columns:1fr;}
  .footer{padding:24px 20px;}
}
</style>
</head>
<body>

<div class="hero">

  <div class="stats-row">

<div class="grid" id="brandGrid"></div>

document.getElementById('totalSubs').textContent=totalSubs;

let allExpanded=false;

let searchVal='';

function render(){
  const fl=searchVal.toLowerCase();
  const grid=document.getElementById('brandGrid');
  grid.innerHTML='';
  let shown=0;

  brands.forEach((b,i)=>{
    if(activeSector!=='all'&&b.sector!==activeSector) return;
    const matchBrand=b.brand.toLowerCase().includes(fl);
    const filteredCats=b.categories.map(c=>({
      ...c,
      subs:c.subs.filter(s=>s.toLowerCase().includes(fl)||c.cat.toLowerCase().includes(fl)||matchBrand)
    })).filter(c=>c.subs.length>0);
    if(!matchBrand&&filteredCats.length===0&&fl!=='') return;

    shown++;
    const catsToShow=fl===''?b.categories:filteredCats;
    const totalBrandSubs=b.categories.reduce((a,c)=>a+c.subs.length,0);
    const isOpen=allExpanded||fl!=='';

    const card=document.createElement('div');
    card.className='brand-card'+(isOpen?' open':'');
    card.innerHTML=`
      <div class="brand-header">
        <div class="brand-left">
          <div class="brand-icon">${b.abbr}</div>
          <div class="brand-info">
            <div class="brand-name">${b.brand}<span class="sector-tag sector-${b.sector}">${sectorLabels[b.sector]}</span></div>
            <div class="brand-meta"><span>${catsToShow.length} categories</span><span>${totalBrandSubs} subcategories</span></div>
          </div>
        </div>
        <span class="chevron">⌄</span>
      </div>
      <div class="brand-body">
        ${catsToShow.map(c=>`
          <div class="cat-block">
            <div class="cat-title">${c.cat}</div>
            <div class="sub-grid">${c.subs.map(s=>`<span class="sub-pill">${s}</span>`).join('')}</div>
          </div>
        `).join('')}
      </div>
    `;
    card.querySelector('.brand-header').addEventListener('click',()=>{
      card.classList.toggle('open');
    });
    grid.appendChild(card);
  });

  if(shown===0){
    grid.innerHTML=`<div class="no-results"><div class="no-results-icon">○</div><p>No brands match your search.</p></div>`;
  }
  document.getElementById('visibleCount').textContent=shown+' brand'+(shown!==1?'s':'')+' shown';
}

document.getElementById('searchInput').addEventListener('input',e=>{searchVal=e.target.value;render();});

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeSector=t.dataset.sector;
    render();
  });
});

document.getElementById('expandAll').addEventListener('click',()=>{
  allExpanded=!allExpanded;
  document.getElementById('expandAll').textContent=allExpanded?'Collapse All':'Expand All';
  document.querySelectorAll('.brand-card').forEach(c=>c.classList.toggle('open',allExpanded));
});

render();
</script>
</body>
</html>
